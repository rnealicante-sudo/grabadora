<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>grabadora | IA Pro</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Librerías Externas -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@google/genai@0.1.0/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style type="text/css">
        :root {
            --bg: #0A0A0B;
            --card: rgba(21, 22, 25, 0.8);
            --accent: #FF4444;
        }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 68, 68, 0.1); border-color: rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 40px rgba(255, 68, 68, 0.3); border-color: rgba(255, 68, 68, 0.2); }
        }
        .recording-active { animation: pulse-red 2s infinite; }

        .btn-press { transform: scale(0.92); transition: transform 0.1s ease; }
        .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Optimización para móviles: evitar selección de texto */
        * { -webkit-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text; user-select: text; }

        .format-pill {
            @apply px-4 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest transition-all border border-white/5 bg-white/5 flex-1 text-center;
        }
        .format-pill.active {
            @apply bg-white text-black shadow-lg border-white;
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen p-4 md:p-8 max-w-2xl mx-auto font-sans pb-32 w-full">
        <!-- Header -->
        <header class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-white">grabadora<span class="text-[#FF4444]">.</span></h1>
                <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em] font-bold mt-1">IA Audio Intelligence</p>
            </div>
            <div id="status-badge" class="flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                <span id="status-text" class="text-[10px] font-mono uppercase tracking-widest text-gray-400">Listo</span>
            </div>
        </header>

        <!-- Format Selector -->
        <div class="mb-8 space-y-3">
            <div class="flex items-center justify-between px-2">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-500">Formato</span>
                <span id="format-info" class="text-[9px] font-mono text-emerald-500 uppercase">MP3 Estándar</span>
            </div>
            <div class="flex gap-3">
                <button id="fmt-mp3" onclick="setFormat('mp3')" class="format-pill active">MP3</button>
                <button id="fmt-small" onclick="setFormat('webm')" class="format-pill">Compacto</button>
            </div>
        </div>

        <!-- Recording Panel -->
        <div id="recording-panel" class="glass rounded-[3.5rem] p-8 md:p-12 mb-12 transition-all relative overflow-hidden">
            <div class="flex flex-col items-center relative z-10">
                <!-- VU Meter -->
                <div id="vu-meter" class="flex gap-2 h-14 items-center mb-10"></div>

                <div id="timer" class="text-7xl md:text-8xl font-bold font-mono tracking-tighter mb-12 tabular-nums text-white">00:00</div>

                <div class="flex items-center gap-3 mb-12 bg-black/40 p-2 rounded-2xl border border-white/5 w-full max-w-[280px]">
                    <button id="btn-standard" onclick="setMode(false)" class="flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all bg-white text-black shadow-lg">Estándar</button>
                    <button id="btn-speaker" onclick="setMode(true)" class="flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all text-gray-500 hover:text-gray-300">Altavoz</button>
                </div>

                <div id="controls" class="flex items-center gap-8 md:gap-12 w-full justify-center">
                    <button id="btn-record" onclick="startRecording()" class="group flex flex-col items-center gap-4 transition-all hover:scale-105 active:btn-press">
                        <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-[#FF4444] flex items-center justify-center shadow-[0_0_60px_rgba(255,68,68,0.4)]">
                            <div class="w-12 h-12 rounded-full bg-white"></div>
                        </div>
                        <span class="text-[11px] font-black uppercase tracking-[0.2em] text-gray-400">Grabar</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="space-y-6">
            <div class="flex items-center justify-between px-4 mb-6">
                <div class="flex items-center gap-3">
                    <i data-lucide="History" class="text-[#FF4444] w-5 h-5"></i>
                    <h2 class="text-2xl font-bold tracking-tight">Historial</h2>
                </div>
                <span id="record-count" class="text-[10px] font-mono text-gray-500 uppercase tracking-widest bg-white/5 px-4 py-1.5 rounded-full border border-white/5">0 Archivos</span>
            </div>
            
            <div id="recordings-list" class="space-y-6">
                <div class="text-center py-24 text-gray-600 border-2 border-dashed border-white/5 rounded-[3rem] bg-white/[0.02]">
                    <i data-lucide="Volume2" class="mx-auto mb-6 opacity-5 w-12 h-12"></i>
                    <p class="text-xs uppercase tracking-[0.3em] font-black">Sin grabaciones</p>
                    <p class="text-[10px] mt-2 opacity-40">Toca el botón rojo para empezar</p>
                </div>
            </div>
        </div>
        
        <footer class="mt-24 py-12 border-t border-white/5 text-center">
            <p class="text-[10px] text-gray-600 uppercase tracking-[0.5em] font-black">grabadora • IA Pro Mobile</p>
        </footer>
    </div>

    <script>
        // --- CONFIG & STATE ---
        const GEMINI_API_KEY = "AIzaSyAJrMMbe5QJald6Si3zAZmsbQUXIf8yylg";
        let state = {
            isRecording: false,
            isPaused: false,
            isSpeakerMode: true,
            outputFormat: 'mp3',
            recordingTime: 0,
            volume: 0,
            recordings: []
        };

        let mediaRecorder = null;
        let chunks = [];
        let timerInterval = null;
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;
        let pcmData = [];
        let stream = null;

        // --- UI HELPERS ---
        function updateUI() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            dot.className = `w-2 h-2 rounded-full ${state.isRecording ? 'bg-red-500 animate-pulse' : 'bg-emerald-500'}`;
            text.innerText = state.isRecording ? 'Grabando' : 'Listo';

            document.getElementById('timer').innerText = formatTime(state.recordingTime);

            const panel = document.getElementById('recording-panel');
            panel.className = `glass rounded-[3.5rem] p-8 md:p-12 mb-12 transition-all relative overflow-hidden ${state.isRecording ? 'recording-active' : ''}`;

            document.getElementById('btn-standard').className = `flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all ${!state.isSpeakerMode ? 'bg-white text-black shadow-lg' : 'text-gray-500 hover:text-gray-300'}`;
            document.getElementById('btn-speaker').className = `flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all ${state.isSpeakerMode ? 'bg-[#FF4444] text-white shadow-[0_0_20px_rgba(255,68,68,0.3)]' : 'text-gray-500 hover:text-gray-300'}`;

            document.getElementById('fmt-mp3').className = `format-pill ${state.outputFormat === 'mp3' ? 'active' : ''}`;
            document.getElementById('fmt-small').className = `format-pill ${state.outputFormat === 'webm' ? 'active' : ''}`;
            document.getElementById('format-info').innerText = state.outputFormat === 'mp3' ? 'MP3 Estándar' : 'WebM Compacto';

            const controls = document.getElementById('controls');
            if (!state.isRecording) {
                controls.innerHTML = `
                    <button id="btn-record" onclick="startRecording()" class="group flex flex-col items-center gap-4 transition-all hover:scale-105 active:btn-press">
                        <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-[#FF4444] flex items-center justify-center shadow-[0_0_60px_rgba(255,68,68,0.4)]">
                            <div class="w-12 h-12 rounded-full bg-white"></div>
                        </div>
                        <span class="text-[11px] font-black uppercase tracking-[0.2em] text-gray-400">Grabar</span>
                    </button>
                `;
            } else {
                controls.innerHTML = `
                    <div class="flex items-center gap-8 md:gap-12 w-full justify-center">
                        <button id="btn-pause" onclick="togglePause()" class="group flex flex-col items-center gap-4 transition-all active:btn-press">
                            <div class="w-24 h-24 md:w-28 md:h-28 rounded-full bg-white/10 border border-white/20 flex items-center justify-center backdrop-blur-md">
                                <i data-lucide="${state.isPaused ? 'Play' : 'Pause'}" class="text-white w-8 h-8"></i>
                            </div>
                            <span class="text-[11px] font-black uppercase tracking-[0.2em] text-gray-500">${state.isPaused ? 'Seguir' : 'Pausa'}</span>
                        </button>
                        <button id="btn-stop" onclick="stopRecording()" class="group flex flex-col items-center gap-4 transition-all active:btn-press">
                            <div class="w-32 h-32 md:w-40 md:h-40 rounded-[3rem] bg-white flex items-center justify-center shadow-2xl">
                                <div class="w-12 h-12 bg-black rounded-xl"></div>
                            </div>
                            <span class="text-[11px] font-black uppercase tracking-[0.2em] text-gray-500">Parar</span>
                        </button>
                    </div>
                `;
            }

            document.getElementById('record-count').innerText = `${state.recordings.length} Archivos`;
            renderList();
            lucide.createIcons();
        }

        function renderVUMeter() {
            const vu = document.getElementById('vu-meter');
            if (!vu) return;
            vu.innerHTML = Array.from({length: 18}).map((_, i) => {
                const isActive = state.volume > (i/18)*100;
                const color = i > 15 ? 'bg-red-500' : i > 11 ? 'bg-yellow-500' : 'bg-emerald-500';
                return `<div class="w-2 rounded-full transition-all duration-75 ${color}" style="height: ${isActive ? Math.max(15, state.volume*0.9) : 8}%; opacity: ${isActive ? 1 : 0.15}"></div>`;
            }).join('');
        }

        function renderList() {
            const list = document.getElementById('recordings-list');
            if (state.recordings.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-24 text-gray-600 border-2 border-dashed border-white/5 rounded-[3rem] bg-white/[0.02]">
                        <i data-lucide="Volume2" class="mx-auto mb-6 opacity-5 w-12 h-12"></i>
                        <p class="text-xs uppercase tracking-[0.3em] font-black">Sin grabaciones</p>
                        <p class="text-[10px] mt-2 opacity-40">Toca el botón rojo para empezar</p>
                    </div>
                `;
            } else {
                list.innerHTML = state.recordings.map(rec => `
                    <div class="glass rounded-[2.5rem] p-7 border border-white/5 hover:border-white/10 transition-all group mb-6">
                        <div class="flex justify-between items-start mb-6">
                            <div class="min-w-0 flex-1">
                                <h3 class="font-bold text-base truncate pr-4 text-white">${rec.name}</h3>
                                <div class="flex gap-4 text-[10px] text-gray-500 font-mono uppercase mt-2">
                                    <span class="flex items-center gap-1.5"><i data-lucide="Clock" class="w-3 h-3"></i> ${formatTime(rec.duration)}</span>
                                    <span class="opacity-20">|</span>
                                    <span class="flex items-center gap-1.5"><i data-lucide="FileAudio" class="w-3 h-3"></i> ${rec.format.toUpperCase()}</span>
                                    <span class="opacity-20">|</span>
                                    <span class="flex items-center gap-1.5"><i data-lucide="Download" class="w-3 h-3"></i> ${(rec.size/1024/1024).toFixed(2)} MB</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="deleteRecording('${rec.id}')" class="w-12 h-12 rounded-2xl flex items-center justify-center text-gray-500 hover:text-red-500 hover:bg-red-500/10 transition-all active:btn-press"><i data-lucide="Trash2" class="w-5 h-5"></i></button>
                                <a href="${rec.url}" download="${rec.name}.${rec.format}" class="w-12 h-12 rounded-2xl flex items-center justify-center text-gray-500 hover:text-white hover:bg-white/10 transition-all active:btn-press"><i data-lucide="Download" class="w-5 h-5"></i></a>
                            </div>
                        </div>

                        <div class="bg-black/40 rounded-3xl p-6 border border-white/5 shadow-inner">
                            <audio id="audio-${rec.id}" src="${rec.url}" playsinline></audio>
                            <div class="w-full bg-white/10 h-2 rounded-full mb-4 overflow-hidden relative">
                                <div id="progress-${rec.id}" class="absolute inset-y-0 left-0 bg-gradient-to-r from-[#FF4444] to-red-400 transition-all duration-100 rounded-full" style="width: 0%"></div>
                            </div>
                            <div class="flex justify-between text-[10px] font-mono text-gray-500 mb-6 uppercase tracking-widest font-bold">
                                <span id="time-${rec.id}">00:00</span>
                                <span id="dur-${rec.id}">00:00</span>
                            </div>
                            <div class="flex justify-center gap-8 items-center">
                                <button onclick="stopAudio('${rec.id}')" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors border border-white/5 active:btn-press"><i data-lucide="Square" class="w-5 h-5 text-gray-500"></i></button>
                                <button onclick="toggleAudio('${rec.id}')" class="w-20 h-20 rounded-full bg-white flex items-center justify-center shadow-2xl active:btn-press transition-all">
                                    <i id="play-icon-${rec.id}" data-lucide="Play" class="w-8 h-8 text-black ml-1"></i>
                                </button>
                                <div class="w-14"></div>
                            </div>
                        </div>

                        <div class="mt-8">
                            ${!rec.transcription ? `
                                <button id="btn-ai-${rec.id}" onclick="analyzeAudio('${rec.id}')" ${rec.isAnalyzing ? 'disabled' : ''} class="w-full bg-white text-black h-16 rounded-2xl text-[11px] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 hover:bg-gray-200 disabled:opacity-50 transition-all shadow-xl active:btn-press">
                                    ${rec.isAnalyzing ? '<div class="w-5 h-5 border-2 border-black/20 border-t-black rounded-full animate-spin"></div> Transcribiendo...' : '<i data-lucide="Sparkles" class="w-5 h-5 text-[#FF4444]"></i> Transcripción Completa IA'}
                                </button>
                            ` : `
                                <div class="w-full space-y-5">
                                    <div class="bg-black/40 border border-white/10 rounded-3xl p-6 text-sm leading-relaxed text-gray-300 whitespace-pre-wrap max-h-80 overflow-y-auto custom-scrollbar shadow-inner">
                                        <div class="text-[#FF4444] font-black uppercase tracking-[0.2em] mb-4 flex items-center gap-2 text-[10px]">
                                            <i data-lucide="FileText" class="w-4 h-4"></i> Transcripción Palabra por Palabra
                                        </div>
                                        ${rec.transcription}
                                    </div>
                                    <div class="flex gap-3">
                                        <button onclick="shareEmail('${rec.id}')" class="flex-1 bg-white/5 h-14 rounded-2xl text-[10px] font-bold uppercase flex items-center justify-center gap-2 hover:bg-white/10 transition-all border border-white/5 active:btn-press">
                                            <i data-lucide="Mail" class="w-4 h-4"></i> Email
                                        </button>
                                        <button onclick="shareWA('${rec.id}')" class="flex-1 bg-[#25D366]/10 text-[#25D366] h-14 rounded-2xl text-[10px] font-bold uppercase flex items-center justify-center gap-2 hover:bg-[#25D366]/20 transition-all border border-[#25D366]/10 active:btn-press">
                                            <i data-lucide="MessageCircle" class="w-4 h-4"></i> WhatsApp
                                        </button>
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                `).join('');
            }
        }

        // --- LOGIC ---
        async function startRecording() {
            try {
                // Despertar AudioContext en móviles
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: !state.isSpeakerMode, 
                        noiseSuppression: !state.isSpeakerMode, 
                        autoGainControl: true 
                    } 
                });

                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                if (state.outputFormat === 'mp3') {
                    const processor = audioContext.createScriptProcessor(4096, 1, 1);
                    source.connect(processor);
                    processor.connect(audioContext.destination);
                    pcmData = [];
                    processor.onaudioprocess = (e) => {
                        if (!state.isRecording || state.isPaused) return;
                        pcmData.push(new Float32Array(e.inputBuffer.getChannelData(0)));
                    };
                }

                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                const updateVolume = () => {
                    if (!analyser) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    state.volume = Math.min(100, (sum / dataArray.length / 128) * 100);
                    renderVUMeter();
                    animationFrame = requestAnimationFrame(updateVolume);
                };
                updateVolume();

                const mimeType = state.outputFormat === 'mp3' ? 'audio/webm' : (['audio/webm;codecs=opus', 'audio/webm'].find(t => MediaRecorder.isTypeSupported(t)) || 'audio/webm');
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                chunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    let finalBlob;
                    let format = state.outputFormat;

                    if (format === 'mp3') {
                        finalBlob = await convertToMp3(pcmData, audioContext.sampleRate);
                    } else {
                        finalBlob = new Blob(chunks, { type: mimeType });
                        format = 'webm';
                    }

                    const url = URL.createObjectURL(finalBlob);
                    state.recordings.unshift({
                        id: Date.now().toString(),
                        blob: finalBlob, url, name: `Grabación ${new Date().toLocaleTimeString()}`,
                        duration: state.recordingTime, size: finalBlob.size, format: format, transcription: null, isAnalyzing: false
                    });
                    state.recordingTime = 0;
                    state.isRecording = false;
                    updateUI();
                };

                mediaRecorder.start(1000);
                state.isRecording = true;
                state.isPaused = false;
                timerInterval = setInterval(() => { state.recordingTime++; document.getElementById('timer').innerText = formatTime(state.recordingTime); }, 1000);
                updateUI();
            } catch (err) {
                alert("Error micro: " + err.message);
            }
        }

        async function convertToMp3(pcmBuffers, sampleRate) {
            const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
            const mp3Data = [];
            for (let buffer of pcmBuffers) {
                const samples = new Int16Array(buffer.length);
                for (let i = 0; i < buffer.length; i++) {
                    samples[i] = buffer[i] < 0 ? buffer[i] * 0x8000 : buffer[i] * 0x7FFF;
                }
                const mp3buf = mp3encoder.encodeBuffer(samples);
                if (mp3buf.length > 0) mp3Data.push(mp3buf);
            }
            const end = mp3encoder.flush();
            if (end.length > 0) mp3Data.push(end);
            return new Blob(mp3Data, { type: 'audio/mp3' });
        }

        function togglePause() {
            if (state.isPaused) {
                mediaRecorder.resume();
                timerInterval = setInterval(() => { state.recordingTime++; document.getElementById('timer').innerText = formatTime(state.recordingTime); }, 1000);
            } else {
                mediaRecorder.pause();
                clearInterval(timerInterval);
            }
            state.isPaused = !state.isPaused;
            updateUI();
        }

        function stopRecording() {
            if (mediaRecorder && state.isRecording) {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                cancelAnimationFrame(animationFrame);
                if (stream) stream.getTracks().forEach(t => t.stop());
                analyser = null;
            }
        }

        function deleteRecording(id) {
            const rec = state.recordings.find(r => r.id === id);
            if (rec) URL.revokeObjectURL(rec.url);
            state.recordings = state.recordings.filter(r => r.id !== id);
            updateUI();
        }

        async function analyzeAudio(id) {
            const rec = state.recordings.find(r => r.id === id);
            if (!rec || rec.isAnalyzing) return;
            
            rec.isAnalyzing = true;
            updateUI();

            try {
                const genAI = new window.google.generativeai.GoogleGenerativeAI(GEMINI_API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const reader = new FileReader();
                const base64Promise = new Promise((resolve, reject) => {
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                });
                reader.readAsDataURL(rec.blob);
                const base64Data = await base64Promise;

                const result = await model.generateContent([
                    "Eres un transcriptor profesional experto en español. Tu tarea es realizar una TRANSCRIPCIÓN COMPLETA Y LITERAL del audio adjunto, palabra por palabra, sin omitir nada. Después de la transcripción completa, añade una sección de 'Resumen y Puntos Clave'. Por favor, utiliza un formato claro y profesional.",
                    { inlineData: { mimeType: rec.blob.type, data: base64Data } }
                ]);
                const response = await result.response;
                rec.transcription = response.text();
            } catch (err) {
                console.error(err);
                alert("Error IA: " + (err.message || "No se pudo procesar el audio"));
            } finally {
                rec.isAnalyzing = false;
                updateUI();
            }
        }

        function setupAudioListeners() {
            state.recordings.forEach(rec => {
                const audio = document.getElementById(`audio-${rec.id}`);
                if (!audio) return;
                audio.ontimeupdate = () => {
                    const prog = document.getElementById(`progress-${rec.id}`);
                    const time = document.getElementById(`time-${rec.id}`);
                    if (prog) prog.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
                    if (time) time.innerText = formatTime(audio.currentTime);
                };
                audio.onloadedmetadata = () => {
                    const dur = document.getElementById(`dur-${rec.id}`);
                    if (dur) dur.innerText = formatTime(audio.duration);
                };
                audio.onended = () => {
                    const icon = document.getElementById(`play-icon-${rec.id}`);
                    if (icon) {
                        icon.setAttribute('data-lucide', 'Play');
                        lucide.createIcons();
                    }
                };
            });
        }

        function toggleAudio(id) {
            const audio = document.getElementById(`audio-${id}`);
            const icon = document.getElementById(`play-icon-${id}`);
            if (audio.paused) {
                // Pausar otros audios
                document.querySelectorAll('audio').forEach(a => {
                    if (a.id !== `audio-${id}`) {
                        a.pause();
                        const otherId = a.id.split('-')[1];
                        const otherIcon = document.getElementById(`play-icon-${otherId}`);
                        if (otherIcon) otherIcon.setAttribute('data-lucide', 'Play');
                    }
                });
                audio.play();
                icon.setAttribute('data-lucide', 'Pause');
            } else {
                audio.pause();
                icon.setAttribute('data-lucide', 'Play');
            }
            lucide.createIcons();
        }

        function stopAudio(id) {
            const audio = document.getElementById(`audio-${id}`);
            audio.pause();
            audio.currentTime = 0;
            const icon = document.getElementById(`play-icon-${id}`);
            icon.setAttribute('data-lucide', 'Play');
            lucide.createIcons();
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function shareEmail(id) {
            const rec = state.recordings.find(r => r.id === id);
            window.location.href = `mailto:?subject=Transcripción&body=${encodeURIComponent(rec.transcription)}`;
        }

        function shareWA(id) {
            const rec = state.recordings.find(r => r.id === id);
            window.open(`https://wa.me/?text=${encodeURIComponent(rec.transcription)}`, '_blank');
        }

        function setFormat(fmt) {
            if(!state.isRecording) { state.outputFormat = fmt; updateUI(); }
        }

        function setMode(isSpeaker) {
            if(!state.isRecording) { state.isSpeakerMode = isSpeaker; updateUI(); }
        }

        // Init
        updateUI();
    </script>
</body>
</html>
