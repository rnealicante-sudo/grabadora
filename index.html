<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartuchera Móvil - Emisión Profesional</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #222;
            color: #f4f4f5;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Overlay para desbloquear audio en iOS */
        #audio-unlock {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
            padding: 20px;
        }

        /* Vúmetro segmentado */
        .vu-container {
            display: flex;
            gap: 1px;
            height: 20px;
            width: 100%;
            background: #000;
            padding: 2px;
            border-bottom: 1px solid #444;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .vu-bar {
            flex: 1;
            height: 100%;
            background: #111;
            transition: background 0.05s;
        }
        .vu-bar.active-green { background: #00ff00; box-shadow: 0 0 8px rgba(0, 255, 0, 0.5); }
        .vu-bar.active-yellow { background: #ffff00; box-shadow: 0 0 8px rgba(255, 255, 0, 0.5); }
        .vu-bar.active-red { background: #ff0000; box-shadow: 0 0 8px rgba(255, 0, 0, 0.5); }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom range input styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 2px;
            background: #ffffff;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }

        /* Master fader specific */
        .master-fader::-webkit-slider-thumb {
            height: 24px;
            width: 12px;
            background: #3498db;
            margin-top: -10px;
        }

        @keyframes blink-red {
            0% { background-color: #1a1a1a; }
            50% { background-color: #7f1d1d; }
            100% { background-color: #1a1a1a; }
        }
        @keyframes blink-red-active {
            0% { background-color: #2a2a2a; }
            50% { background-color: #991b1b; }
            100% { background-color: #2a2a2a; }
        }
        .animate-blink-red {
            animation: blink-red 0.5s infinite;
        }
        .animate-blink-red-active {
            animation: blink-red-active 0.5s infinite;
        }
    </style>
</head>
<body>
    <div id="audio-unlock">
        <div class="bg-blue-600 p-6 rounded-2xl shadow-2xl animate-bounce mb-4">
            <i data-lucide="Volume2" class="w-12 h-12 text-white"></i>
        </div>
        <h2 class="text-xl font-black uppercase tracking-tighter mb-2">Cartuchera Móvil</h2>
        <p class="text-zinc-400 text-sm mb-6">Toca para activar el sistema de audio<br>(Requerido en iPhone)</p>
        <button class="bg-white text-black px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs">Comenzar</button>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // Desbloqueo global para iOS
        const unlockAudio = () => {
            const unlockEl = document.getElementById('audio-unlock');
            if (unlockEl) unlockEl.style.display = 'none';
            
            // Crear y resumir un AudioContext global para "despertar" a iOS
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            const tempCtx = new AudioContextClass();
            tempCtx.resume();
            
            // Crear un silencio corto
            const oscillator = tempCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, tempCtx.currentTime);
            oscillator.connect(tempCtx.destination);
            oscillator.start();
            oscillator.stop(tempCtx.currentTime + 0.001);
        };

        document.getElementById('audio-unlock').addEventListener('click', unlockAudio);

        // Componente de Vúmetro
        const VuMeter = ({ level }) => {
            const bars = Array.from({ length: 60 });
            return (
                <div className="vu-container">
                    {bars.map((_, i) => {
                        const threshold = i / bars.length;
                        const isActive = level > threshold;
                        let colorClass = "";
                        if (isActive) {
                            if (i < bars.length * 0.6) colorClass = "active-green";
                            else if (i < bars.length * 0.85) colorClass = "active-yellow";
                            else colorClass = "active-red";
                        }
                        return <div key={i} className={`vu-bar ${colorClass}`} />;
                    })}
                </div>
            );
        };

        // Componente de Icono usando Lucide
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide',
                        icons: { [name]: lucide.icons[name] }
                    });
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // Componente de cada Cartuchera
        const CartItem = ({ index, masterVolume, masterAudio, onTrigger, onStateChange, onNext }) => {
            const [file, setFile] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isLooping, setIsLooping] = useState(false);
            const [isLinked, setIsLinked] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [timeMode, setTimeMode] = useState('remaining');
            const [localVolume, setLocalVolume] = useState(1);
            
            const audioRef = useRef(null);
            const sourceNodeRef = useRef(null);
            const gainNodeRef = useRef(null);

            useEffect(() => {
                if (gainNodeRef.current) {
                    gainNodeRef.current.gain.value = localVolume * masterVolume;
                }
            }, [localVolume, masterVolume]);

            const setupAudioContext = async () => {
                if (!audioRef.current || !masterAudio.ctx) return;
                
                if (!sourceNodeRef.current) {
                    const ctx = masterAudio.ctx;
                    const source = ctx.createMediaElementSource(audioRef.current);
                    const gain = ctx.createGain();
                    
                    source.connect(gain);
                    // Conectar al limitador en lugar de directamente al analizador
                    if (masterAudio.limiter) {
                        gain.connect(masterAudio.limiter);
                    } else {
                        gain.connect(masterAudio.analyser);
                    }
                    
                    sourceNodeRef.current = source;
                    gainNodeRef.current = gain;
                    gain.gain.value = localVolume * masterVolume;
                }
                
                if (masterAudio.ctx.state === 'suspended') {
                    await masterAudio.ctx.resume();
                }
            };

            const handleFileChange = (e) => {
                const f = e.target.files?.[0];
                if (f) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        if (audioRef.current) {
                            audioRef.current.src = event.target.result;
                            audioRef.current.load();
                            setFile(f);
                        }
                    };
                    reader.readAsDataURL(f);
                }
            };

            const play = useCallback(async () => {
                if (!audioRef.current || !file) return;
                await setupAudioContext();
                
                const playPromise = audioRef.current.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        setIsPlaying(true);
                        onStateChange(true);
                    }).catch(err => {
                        console.error("Error en reproducción iOS:", err);
                    });
                }
            }, [file, masterAudio, onStateChange]);

            const stop = useCallback(() => {
                if (audioRef.current) {
                    audioRef.current.pause();
                    audioRef.current.currentTime = 0;
                    setIsPlaying(false);
                    onStateChange(false);
                }
            }, [onStateChange]);

            const togglePlay = useCallback(async (forcePlay) => {
                if (forcePlay === true) {
                    if (!isPlaying) await play();
                } else {
                    if (isPlaying) stop();
                    else await play();
                }
            }, [isPlaying, play, stop]);

            useEffect(() => {
                if (onTrigger) onTrigger(togglePlay);
            }, [onTrigger, togglePlay]);

            const clearAudio = (e) => {
                e.stopPropagation();
                if (isPlaying) stop();
                setFile(null);
                setCurrentTime(0);
                setDuration(0);
                if (audioRef.current) {
                    audioRef.current.src = "";
                    audioRef.current.load();
                }
            };

            const formatTime = (time) => {
                const m = Math.floor(time / 60);
                const s = Math.floor(time % 60);
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            };

            const progress = duration > 0 ? (currentTime / duration) * 100 : 0;
            const remainingTime = duration - currentTime;
            const isEnding = isPlaying && remainingTime > 0 && remainingTime <= 4;

            return (
                <div className={`border border-zinc-700 flex h-[85px] overflow-hidden rounded-sm transition-colors duration-300 
                    ${isPlaying ? (isEnding ? 'animate-blink-red-active' : 'bg-[#2a2a2a]') : (isEnding ? 'animate-blink-red' : 'bg-[#1a1a1a]')}`}>
                    
                    <div onClick={() => file && togglePlay()} className={`w-14 flex items-center justify-center border-r border-zinc-700 cursor-pointer ${isPlaying ? 'bg-blue-900/40' : 'bg-[#252525]'}`}>
                        <span className={`text-4xl font-bold ${isPlaying ? 'text-blue-400' : 'text-zinc-500'}`}>{index + 1}</span>
                    </div>

                    <div className="flex-1 flex flex-col px-3 py-2 justify-center gap-1.5 relative">
                        <div className="flex items-center gap-2 z-10">
                            {file ? (
                                <h3 className="text-[10px] font-bold truncate text-zinc-400 uppercase tracking-wider flex-1">{file.name}</h3>
                            ) : (
                                <span className="text-[8px] font-black text-zinc-700 uppercase tracking-widest">Vacío</span>
                            )}
                        </div>

                        {!file && (
                            <div className="absolute inset-0 flex items-center justify-center">
                                <label 
                                    htmlFor={`file-input-${index}`}
                                    className="cursor-pointer flex flex-col items-center gap-1 text-zinc-500 hover:text-blue-400 active:scale-95 transition-transform"
                                >
                                    <Icon name="Upload" className="w-5 h-5" />
                                    <span className="text-[9px] font-black uppercase">Cargar</span>
                                    <input 
                                        id={`file-input-${index}`}
                                        type="file" 
                                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" 
                                        accept="audio/*,video/*,.mp3,.wav,.m4a,.aac" 
                                        onChange={handleFileChange} 
                                    />
                                </label>
                            </div>
                        )}
                        
                        <div className={`space-y-1 ${!file ? 'opacity-0 pointer-events-none' : ''}`}>
                            <div className="relative flex items-center">
                                <input 
                                    type="range" min="0" max={duration || 0} step="0.1" value={currentTime}
                                    onChange={(e) => { if (audioRef.current) audioRef.current.currentTime = parseFloat(e.target.value); }}
                                    className="w-full h-3 bg-zinc-800 rounded-sm appearance-none cursor-pointer"
                                    style={{ background: `linear-gradient(to right, #5dade2 ${progress}%, #333 ${progress}%)` }}
                                />
                            </div>
                            <div className="flex items-center gap-2">
                                <Icon name="Volume2" className="w-2.5 h-2.5 text-zinc-600" />
                                <input 
                                    type="range" min="0" max="1" step="0.01" value={localVolume}
                                    onChange={(e) => setLocalVolume(parseFloat(e.target.value))}
                                    className="flex-1 h-1 bg-zinc-800 rounded-full appearance-none cursor-pointer"
                                    style={{ background: `linear-gradient(to right, #3498db ${localVolume * 100}%, #333 ${localVolume * 100}%)` }}
                                />
                            </div>
                        </div>
                    </div>

                    <div className="w-28 flex flex-col p-1.5 gap-1 border-l border-zinc-700 bg-[#222]">
                        <div className="flex items-center justify-end gap-2 px-1">
                            <button 
                                onClick={clearAudio}
                                className={`p-1.5 rounded-md transition-all shadow-sm ${
                                    file 
                                        ? 'bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500 hover:text-white' 
                                        : 'text-zinc-800 pointer-events-none'
                                }`}
                                title="Eject / Limpiar"
                            >
                                <Icon name="Eject" className="w-4 h-4 fill-current" />
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); setIsLinked(!isLinked); }}
                                className={`p-1.5 rounded-md transition-all border ${
                                    isLinked 
                                        ? 'bg-orange-500/20 text-orange-400 border-orange-500/30' 
                                        : 'text-zinc-600 border-transparent'
                                }`}
                            >
                                <Icon name="Link" className="w-4 h-4" />
                            </button>
                            <button 
                                onClick={() => file && togglePlay()} 
                                className={`w-7 h-7 rounded-sm flex items-center justify-center border border-black/40 transition-all ${
                                    !file ? 'bg-zinc-800' : isPlaying ? 'bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.4)]' : 'bg-zinc-700'
                                }`}
                            >
                                <div className={`w-3 h-3 bg-white rounded-sm ${isPlaying ? 'opacity-100' : 'opacity-20'}`} />
                            </button>
                        </div>
                        <div 
                            onClick={() => setTimeMode(prev => prev === 'elapsed' ? 'remaining' : 'elapsed')} 
                            className={`border border-white/10 rounded-sm flex-1 flex items-center justify-center cursor-pointer overflow-hidden transition-colors duration-200 ${isEnding ? 'bg-red-600 animate-pulse' : 'bg-[#3498db]'}`}
                        >
                            <span className="text-[22px] font-mono font-black text-white leading-none tracking-tighter">
                                {timeMode === 'elapsed' ? formatTime(currentTime) : `-${formatTime(remainingTime)}`}
                            </span>
                        </div>
                    </div>

                    <audio 
                        ref={audioRef} 
                        loop={isLooping} 
                        playsInline
                        preload="auto"
                        onLoadedMetadata={(e) => setDuration(e.currentTarget.duration)} 
                        onTimeUpdate={(e) => setCurrentTime(e.currentTarget.currentTime)} 
                        onEnded={() => { 
                            setIsPlaying(false); 
                            onStateChange(false); 
                            if (isLinked && onNext) onNext(); 
                        }} 
                    />
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [playingCount, setPlayingCount] = useState(0);
            const [masterVolume, setMasterVolume] = useState(1);
            const [isLimiterActive, setIsLimiterActive] = useState(false);
            const [vuLevel, setVuLevel] = useState(0);
            const [masterAudio, setMasterAudio] = useState({ ctx: null, analyser: null, limiter: null });
            const cartTriggers = useRef({});
            const cartsPerPage = 8;

            useEffect(() => {
                const handleUnlock = () => {
                    if (masterAudio.ctx) return;
                    
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioContextClass();
                    
                    // Crear Limitador/Compresor
                    const limiter = ctx.createDynamicsCompressor();
                    limiter.threshold.setValueAtTime(-24, ctx.currentTime);
                    limiter.knee.setValueAtTime(30, ctx.currentTime);
                    limiter.ratio.setValueAtTime(1, ctx.currentTime); // Empieza desactivado (1:1)
                    limiter.attack.setValueAtTime(0.003, ctx.currentTime);
                    limiter.release.setValueAtTime(0.25, ctx.currentTime);

                    const analyser = ctx.createAnalyser();
                    analyser.fftSize = 256;
                    
                    // Conexión: Limitador -> Analizador -> Salida
                    limiter.connect(analyser);
                    analyser.connect(ctx.destination);
                    
                    setMasterAudio({ ctx, analyser, limiter });

                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    const updateVu = () => {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < dataArray.length; i++) {
                            sum += dataArray[i];
                        }
                        const average = sum / dataArray.length;
                        const normalized = Math.min(1, (average / 100) * 1.5);
                        setVuLevel(normalized);
                        requestAnimationFrame(updateVu);
                    };
                    updateVu();
                };

                document.getElementById('audio-unlock').addEventListener('click', handleUnlock);
                return () => document.getElementById('audio-unlock').removeEventListener('click', handleUnlock);
            }, [masterAudio.ctx]);

            // Efecto para activar/desactivar el limitador
            useEffect(() => {
                if (masterAudio.limiter && masterAudio.ctx) {
                    const ctx = masterAudio.ctx;
                    if (isLimiterActive) {
                        masterAudio.limiter.ratio.setTargetAtTime(20, ctx.currentTime, 0.1);
                        masterAudio.limiter.threshold.setTargetAtTime(-24, ctx.currentTime, 0.1);
                    } else {
                        masterAudio.limiter.ratio.setTargetAtTime(1, ctx.currentTime, 0.1);
                        masterAudio.limiter.threshold.setTargetAtTime(0, ctx.currentTime, 0.1);
                    }
                }
            }, [isLimiterActive, masterAudio.limiter, masterAudio.ctx]);

            const handleStateChange = (isPlaying) => {
                setPlayingCount(prev => isPlaying ? prev + 1 : Math.max(0, prev - 1));
            };

            const triggerNext = (currentIndex) => {
                const nextIndex = currentIndex + 1;
                if (nextIndex < cartsPerPage && cartTriggers.current[nextIndex]) {
                    cartTriggers.current[nextIndex](true);
                }
            };

            return (
                <div className="min-h-screen bg-[#222] text-zinc-100 flex flex-col pt-[20px]">
                    <VuMeter level={vuLevel} />
                    <header className="bg-[#1a1a1a] border-b border-zinc-800 sticky top-[20px] z-50">
                        <div className="max-w-[800px] mx-auto px-4 py-2 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <Icon name="Radio" className="w-4 h-4 text-blue-400" />
                                <h1 className="text-xs font-black tracking-widest uppercase text-zinc-300">OnAir Multi <span className="text-blue-500">- EMISIÓN</span></h1>
                            </div>
                            {playingCount > 0 && (
                                <div className="px-2 py-0.5 bg-red-900/40 rounded border border-red-600 flex items-center gap-1.5">
                                    <div className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse-red" />
                                    <span className="text-red-400 font-bold uppercase text-[8px]">ON AIR</span>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-[800px] w-full mx-auto p-3 flex-1 overflow-hidden">
                        <div className="h-full flex flex-col gap-2">
                            {Array.from({ length: cartsPerPage }).map((_, i) => (
                                <CartItem key={i} index={i} masterVolume={masterVolume} masterAudio={masterAudio} onTrigger={(fn) => cartTriggers.current[i] = fn} onStateChange={handleStateChange} onNext={() => triggerNext(i)} />
                            ))}
                        </div>
                    </main>

                    <div className="bg-[#1a1a1a] border-t border-zinc-800 p-3 shadow-2xl z-50">
                        <div className="max-w-[800px] mx-auto flex flex-col gap-3">
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={() => setIsLimiterActive(!isLimiterActive)}
                                    className={`px-2 py-1.5 rounded border font-black text-[8px] uppercase transition-all ${
                                        isLimiterActive 
                                            ? 'bg-green-500/20 border-green-500 text-green-500 shadow-[0_0_10px_rgba(34,197,94,0.3)]' 
                                            : 'bg-zinc-800 border-zinc-700 text-zinc-500'
                                    }`}
                                >
                                    Limiter
                                </button>
                                <Icon name={masterVolume === 0 ? "VolumeX" : "Volume2"} className="w-5 h-5 text-blue-400" />
                                <div className="flex-1 relative h-8 flex items-center">
                                    <input type="range" min="0" max="1" step="0.01" value={masterVolume} onChange={(e) => setMasterVolume(parseFloat(e.target.value))} className="master-fader w-full h-1.5 bg-zinc-800 rounded-full appearance-none cursor-pointer" style={{ background: `linear-gradient(to right, #3498db ${masterVolume * 100}%, #333 ${masterVolume * 100}%)` }} />
                                </div>
                                <span className="text-[10px] font-bold text-zinc-400">{Math.round(masterVolume * 100)}%</span>
                            </div>
                            <div className="flex items-center justify-between">
                                <span className="text-[8px] font-bold uppercase tracking-widest text-zinc-600">Cartuchera Móvil v1.0</span>
                                <div className="flex items-center gap-2">
                                    <span className="text-[9px] font-bold text-emerald-500 uppercase">Sistema Listo</span>
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
