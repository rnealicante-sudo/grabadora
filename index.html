<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>grabadora | IA Pro</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Librerías Externas -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style type="text/css">
        :root {
            --bg: #0A0A0B;
            --card: rgba(21, 22, 25, 0.9);
            --accent: #FF4444;
        }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 68, 68, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 68, 68, 0.3); }
        }
        .recording-active { animation: pulse-red 2s infinite; border-color: rgba(255, 68, 68, 0.3); }

        .btn-press { transform: scale(0.94); transition: transform 0.1s ease; }
        
        * { -webkit-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text; user-select: text; }

        .format-pill {
            @apply px-4 py-2.5 rounded-xl text-[9px] font-bold uppercase tracking-widest transition-all border border-white/5 bg-white/5 flex-1 text-center;
        }
        .format-pill.active {
            @apply bg-white text-black shadow-lg border-white;
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen p-4 md:p-6 max-w-xl mx-auto font-sans pb-32 w-full">
        <!-- Header -->
        <header class="mb-6 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white">grabadora<span class="text-[#FF4444]">.</span></h1>
                <p class="text-gray-500 text-[9px] uppercase tracking-[0.3em] font-bold mt-0.5">IA Audio Intelligence</p>
            </div>
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-white/10 bg-white/5">
                <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                <span id="status-text" class="text-[9px] font-mono uppercase tracking-widest text-gray-400">Listo</span>
            </div>
        </header>

        <!-- Format Selector -->
        <div class="mb-6 space-y-2">
            <div class="flex items-center justify-between px-1">
                <span class="text-[9px] font-black uppercase tracking-widest text-gray-500">Formato de Audio</span>
                <span id="format-info" class="text-[8px] font-mono text-emerald-500 uppercase">Compacto (Por defecto)</span>
            </div>
            <div class="flex gap-2 bg-white/5 p-1 rounded-xl border border-white/5">
                <button id="fmt-small" onclick="setFormat('webm')" class="format-pill active">Compacto</button>
                <button id="fmt-mp3" onclick="setFormat('mp3')" class="format-pill">MP3</button>
            </div>
        </div>

        <!-- Recording Panel -->
        <div id="recording-panel" class="glass rounded-[2.5rem] p-6 md:p-10 mb-8 transition-all relative overflow-hidden">
            <div class="flex flex-col items-center relative z-10">
                <!-- VU Meter -->
                <div id="vu-meter" class="flex gap-1.5 h-10 items-center mb-8"></div>

                <div id="timer" class="text-6xl md:text-7xl font-bold font-mono tracking-tighter mb-10 tabular-nums text-white">00:00</div>

                <div class="flex items-center gap-2 mb-10 bg-black/40 p-1.5 rounded-xl border border-white/5 w-full max-w-[240px]">
                    <button id="btn-standard" onclick="setMode(false)" class="flex-1 py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-widest transition-all bg-white text-black">Estándar</button>
                    <button id="btn-speaker" onclick="setMode(true)" class="flex-1 py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-widest transition-all text-gray-500">Altavoz</button>
                </div>

                <div id="controls" class="flex items-center gap-8 w-full justify-center">
                    <button id="btn-record" onclick="startRecording()" class="group flex flex-col items-center gap-3 transition-all hover:scale-105 active:btn-press">
                        <div class="w-28 h-28 md:w-32 md:h-32 rounded-full bg-[#FF4444] flex items-center justify-center shadow-[0_0_40px_rgba(255,68,68,0.3)]">
                            <div class="w-10 h-10 rounded-full bg-white"></div>
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">Grabar</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="space-y-4">
            <div class="flex items-center justify-between px-2 mb-4">
                <div class="flex items-center gap-2">
                    <i data-lucide="History" class="text-[#FF4444] w-4 h-4"></i>
                    <h2 class="text-xl font-bold tracking-tight">Historial</h2>
                </div>
                <span id="record-count" class="text-[8px] font-mono text-gray-500 uppercase tracking-widest bg-white/5 px-3 py-1 rounded-full border border-white/5">0 Archivos</span>
            </div>
            
            <div id="recordings-list" class="space-y-4">
                <div class="text-center py-16 text-gray-600 border-2 border-dashed border-white/5 rounded-[2rem] bg-white/[0.02]">
                    <i data-lucide="Volume2" class="mx-auto mb-4 opacity-5 w-10 h-10"></i>
                    <p class="text-[10px] uppercase tracking-[0.2em] font-black">Sin grabaciones</p>
                </div>
            </div>
        </div>
        
        <footer class="mt-16 py-8 border-t border-white/5 text-center">
            <p class="text-[9px] text-gray-600 uppercase tracking-[0.4em] font-black">grabadora • IA v2.0</p>
        </footer>
    </div>

    <script>
        // --- CONFIG & STATE ---
        const GEMINI_API_KEY = "AIzaSyAJrMMbe5QJald6Si3zAZmsbQUXIf8yylg";
        let state = {
            isRecording: false,
            isPaused: false,
            isSpeakerMode: true,
            outputFormat: 'webm', // WebM por defecto
            recordingTime: 0,
            volume: 0,
            recordings: []
        };

        let mediaRecorder = null;
        let chunks = [];
        let timerInterval = null;
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;
        let pcmData = [];
        let stream = null;

        // --- UI HELPERS ---
        function updateUI() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            dot.className = `w-1.5 h-1.5 rounded-full ${state.isRecording ? 'bg-red-500 animate-pulse' : 'bg-emerald-500'}`;
            text.innerText = state.isRecording ? 'Grabando' : 'Listo';

            document.getElementById('timer').innerText = formatTime(state.recordingTime);

            const panel = document.getElementById('recording-panel');
            panel.className = `glass rounded-[2.5rem] p-6 md:p-10 mb-8 transition-all relative overflow-hidden ${state.isRecording ? 'recording-active' : ''}`;

            document.getElementById('btn-standard').className = `flex-1 py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-widest transition-all ${!state.isSpeakerMode ? 'bg-white text-black shadow-lg' : 'text-gray-500 hover:text-gray-300'}`;
            document.getElementById('btn-speaker').className = `flex-1 py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-widest transition-all ${state.isSpeakerMode ? 'bg-[#FF4444] text-white shadow-[0_0_20px_rgba(255,68,68,0.3)]' : 'text-gray-500 hover:text-gray-300'}`;

            document.getElementById('fmt-mp3').className = `format-pill ${state.outputFormat === 'mp3' ? 'active' : ''}`;
            document.getElementById('fmt-small').className = `format-pill ${state.outputFormat === 'webm' ? 'active' : ''}`;
            document.getElementById('format-info').innerText = state.outputFormat === 'mp3' ? 'Alta Calidad (MP3)' : 'Compacto (WebM)';

            const controls = document.getElementById('controls');
            if (!state.isRecording) {
                controls.innerHTML = `
                    <button id="btn-record" onclick="startRecording()" class="group flex flex-col items-center gap-3 transition-all hover:scale-105 active:btn-press">
                        <div class="w-28 h-28 md:w-32 md:h-32 rounded-full bg-[#FF4444] flex items-center justify-center shadow-[0_0_40px_rgba(255,68,68,0.3)]">
                            <div class="w-10 h-10 rounded-full bg-white"></div>
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">Grabar</span>
                    </button>
                `;
            } else {
                controls.innerHTML = `
                    <div class="flex items-center gap-6 w-full justify-center">
                        <button id="btn-pause" onclick="togglePause()" class="group flex flex-col items-center gap-3 transition-all active:btn-press">
                            <div class="w-20 h-20 rounded-full bg-white/10 border border-white/20 flex items-center justify-center backdrop-blur-md">
                                <i data-lucide="${state.isPaused ? 'Play' : 'Pause'}" class="text-white w-6 h-6"></i>
                            </div>
                            <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-500">${state.isPaused ? 'Seguir' : 'Pausa'}</span>
                        </button>
                        <button id="btn-stop" onclick="stopRecording()" class="group flex flex-col items-center gap-3 transition-all active:btn-press">
                            <div class="w-28 h-28 rounded-[2rem] bg-white flex items-center justify-center shadow-xl">
                                <div class="w-10 h-10 bg-black rounded-lg"></div>
                            </div>
                            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Parar</span>
                        </button>
                    </div>
                `;
            }

            document.getElementById('record-count').innerText = `${state.recordings.length} Archivos`;
            renderList();
            lucide.createIcons();
        }

        function renderVUMeter() {
            const vu = document.getElementById('vu-meter');
            if (!vu) return;
            vu.innerHTML = Array.from({length: 15}).map((_, i) => {
                const isActive = state.volume > (i/15)*100;
                const color = i > 12 ? 'bg-red-500' : i > 9 ? 'bg-yellow-500' : 'bg-emerald-500';
                return `<div class="w-1.5 rounded-full transition-all duration-75 ${color}" style="height: ${isActive ? Math.max(12, state.volume*0.7) : 6}%; opacity: ${isActive ? 1 : 0.15}"></div>`;
            }).join('');
        }

        function renderList() {
            const list = document.getElementById('recordings-list');
            if (state.recordings.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-16 text-gray-600 border-2 border-dashed border-white/5 rounded-[2rem] bg-white/[0.02]">
                        <i data-lucide="Volume2" class="mx-auto mb-4 opacity-5 w-10 h-10"></i>
                        <p class="text-[10px] uppercase tracking-[0.2em] font-black">Sin grabaciones</p>
                    </div>
                `;
            } else {
                list.innerHTML = state.recordings.map(rec => `
                    <div class="glass rounded-[2rem] p-5 border border-white/5 transition-all group mb-4">
                        <div class="flex justify-between items-start mb-4">
                            <div class="min-w-0 flex-1">
                                <h3 class="font-bold text-sm truncate pr-2 text-white">${rec.name}</h3>
                                <div class="flex gap-3 text-[8px] text-gray-500 font-mono uppercase mt-1">
                                    <span>${formatTime(rec.duration)}</span>
                                    <span class="opacity-20">|</span>
                                    <span>${rec.format.toUpperCase()}</span>
                                    <span class="opacity-20">|</span>
                                    <span>${(rec.size/1024/1024).toFixed(2)} MB</span>
                                </div>
                            </div>
                            <div class="flex gap-1.5">
                                <button onclick="deleteRecording('${rec.id}')" class="w-9 h-9 rounded-xl flex items-center justify-center text-gray-500 hover:text-red-500 hover:bg-red-500/10 active:btn-press"><i data-lucide="Trash2" class="w-4 h-4"></i></button>
                                <button onclick="downloadRecording('${rec.id}')" class="w-9 h-9 rounded-xl flex items-center justify-center bg-[#FF4444]/10 text-[#FF4444] border border-[#FF4444]/20 active:btn-press"><i data-lucide="Download" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <!-- Player Compacto -->
                        <div class="bg-black/30 rounded-2xl p-4 border border-white/5">
                            <audio id="audio-${rec.id}" src="${rec.url}" playsinline></audio>
                            <div class="w-full bg-white/5 h-1.5 rounded-full mb-3 overflow-hidden relative">
                                <div id="progress-${rec.id}" class="absolute inset-y-0 left-0 bg-[#FF4444] transition-all duration-100 rounded-full" style="width: 0%"></div>
                            </div>
                            <div class="flex justify-between items-center">
                                <span id="time-${rec.id}" class="text-[8px] font-mono text-gray-500">00:00</span>
                                <div class="flex gap-4 items-center">
                                    <button onclick="stopAudio('${rec.id}')" class="text-gray-600 active:scale-90"><i data-lucide="Square" class="w-3.5 h-3.5"></i></button>
                                    <button onclick="toggleAudio('${rec.id}')" class="w-10 h-10 rounded-full bg-white flex items-center justify-center active:btn-press">
                                        <i id="play-icon-${rec.id}" data-lucide="Play" class="w-4 h-4 text-black ml-0.5"></i>
                                    </button>
                                </div>
                                <span id="dur-${rec.id}" class="text-[8px] font-mono text-gray-500">00:00</span>
                            </div>
                        </div>

                        <div class="mt-4">
                            ${!rec.transcription ? `
                                <button onclick="analyzeAudio('${rec.id}')" ${rec.isAnalyzing ? 'disabled' : ''} class="w-full bg-white text-black h-12 rounded-xl text-[9px] font-black uppercase tracking-[0.1em] flex items-center justify-center gap-2 hover:bg-gray-200 disabled:opacity-50 active:btn-press">
                                    ${rec.isAnalyzing ? '<div class="w-3 h-3 border-2 border-black/20 border-t-black rounded-full animate-spin"></div>' : '<i data-lucide="Sparkles" class="w-3.5 h-3.5 text-[#FF4444]"></i>'} Transcripción Completa IA
                                </button>
                            ` : `
                                <div class="w-full space-y-3">
                                    <div class="bg-black/40 border border-white/10 rounded-2xl p-4 text-[11px] leading-relaxed text-gray-300 whitespace-pre-wrap max-h-60 overflow-y-auto custom-scrollbar">
                                        <div class="text-[#FF4444] font-black uppercase tracking-[0.1em] mb-2 flex items-center gap-1.5 text-[8px]">
                                            <i data-lucide="FileText" class="w-3 h-3"></i> Transcripción Palabra por Palabra
                                        </div>
                                        ${rec.transcription}
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="shareEmail('${rec.id}')" class="flex-1 bg-white/5 h-10 rounded-xl text-[8px] font-bold uppercase flex items-center justify-center gap-1.5 hover:bg-white/10 border border-white/5">
                                            <i data-lucide="Mail" class="w-3 h-3"></i> Email
                                        </button>
                                        <button onclick="shareWA('${rec.id}')" class="flex-1 bg-[#25D366]/10 text-[#25D366] h-10 rounded-xl text-[8px] font-bold uppercase flex items-center justify-center gap-1.5 hover:bg-[#25D366]/20 border border-[#25D366]/10">
                                            <i data-lucide="MessageCircle" class="w-3 h-3"></i> WhatsApp
                                        </button>
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                `).join('');
            }
        }

        // --- LOGIC ---
        async function startRecording() {
            try {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();

                stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: !state.isSpeakerMode, noiseSuppression: !state.isSpeakerMode, autoGainControl: true } 
                });

                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                if (state.outputFormat === 'mp3') {
                    const processor = audioContext.createScriptProcessor(4096, 1, 1);
                    source.connect(processor);
                    processor.connect(audioContext.destination);
                    pcmData = [];
                    processor.onaudioprocess = (e) => {
                        if (!state.isRecording || state.isPaused) return;
                        pcmData.push(new Float32Array(e.inputBuffer.getChannelData(0)));
                    };
                }

                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                const updateVolume = () => {
                    if (!analyser) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    state.volume = Math.min(100, (sum / dataArray.length / 128) * 100);
                    renderVUMeter();
                    animationFrame = requestAnimationFrame(updateVolume);
                };
                updateVolume();

                const mimeType = state.outputFormat === 'mp3' ? 'audio/webm' : (['audio/webm;codecs=opus', 'audio/webm'].find(t => MediaRecorder.isTypeSupported(t)) || 'audio/webm');
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                chunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    let finalBlob;
                    let format = state.outputFormat;

                    if (format === 'mp3') {
                        finalBlob = await convertToMp3(pcmData, audioContext.sampleRate);
                    } else {
                        finalBlob = new Blob(chunks, { type: mimeType });
                        format = 'webm';
                    }

                    const url = URL.createObjectURL(finalBlob);
                    const newRec = {
                        id: Date.now().toString(),
                        blob: finalBlob, url, name: `Grabación ${new Date().toLocaleTimeString()}`,
                        duration: state.recordingTime, size: finalBlob.size, format: format, transcription: null, isAnalyzing: false
                    };
                    state.recordings.unshift(newRec);
                    state.recordingTime = 0;
                    state.isRecording = false;
                    updateUI();
                    
                    // Notificar al usuario
                    setTimeout(() => {
                        alert("¡Grabación finalizada! Pulsa el botón de descarga rojo para guardarla en tu dispositivo (habitualmente en la carpeta 'Descargas').");
                    }, 500);
                };

                mediaRecorder.start(1000);
                state.isRecording = true;
                state.isPaused = false;
                timerInterval = setInterval(() => { state.recordingTime++; document.getElementById('timer').innerText = formatTime(state.recordingTime); }, 1000);
                updateUI();
            } catch (err) {
                alert("Error micro: " + err.message);
            }
        }

        async function convertToMp3(pcmBuffers, sampleRate) {
            const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
            const mp3Data = [];
            for (let buffer of pcmBuffers) {
                const samples = new Int16Array(buffer.length);
                for (let i = 0; i < buffer.length; i++) {
                    samples[i] = buffer[i] < 0 ? buffer[i] * 0x8000 : buffer[i] * 0x7FFF;
                }
                const mp3buf = mp3encoder.encodeBuffer(samples);
                if (mp3buf.length > 0) mp3Data.push(mp3buf);
            }
            const end = mp3encoder.flush();
            if (end.length > 0) mp3Data.push(end);
            return new Blob(mp3Data, { type: 'audio/mp3' });
        }

        function togglePause() {
            if (state.isPaused) {
                mediaRecorder.resume();
                timerInterval = setInterval(() => { state.recordingTime++; document.getElementById('timer').innerText = formatTime(state.recordingTime); }, 1000);
            } else {
                mediaRecorder.pause();
                clearInterval(timerInterval);
            }
            state.isPaused = !state.isPaused;
            updateUI();
        }

        function stopRecording() {
            if (mediaRecorder && state.isRecording) {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                cancelAnimationFrame(animationFrame);
                if (stream) stream.getTracks().forEach(t => t.stop());
                analyser = null;
            }
        }

        function downloadRecording(id) {
            const rec = state.recordings.find(r => r.id === id);
            if (!rec) return;
            const a = document.createElement('a');
            a.href = rec.url;
            a.download = `${rec.name}.${rec.format}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function deleteRecording(id) {
            const rec = state.recordings.find(r => r.id === id);
            if (rec) URL.revokeObjectURL(rec.url);
            state.recordings = state.recordings.filter(r => r.id !== id);
            updateUI();
        }

        // --- FIX IA: CONEXIÓN DIRECTA ---
        async function analyzeAudio(id) {
            const rec = state.recordings.find(r => r.id === id);
            if (!rec || rec.isAnalyzing) return;
            
            rec.isAnalyzing = true;
            updateUI();

            try {
                const reader = new FileReader();
                const base64Promise = new Promise((resolve) => {
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(rec.blob);
                });
                const base64Data = await base64Promise;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "Eres un transcriptor profesional. Tu tarea es realizar una TRANSCRIPCIÓN COMPLETA Y LITERAL del audio adjunto, palabra por palabra, sin omitir nada. Después de la transcripción completa, añade una sección de 'Resumen y Puntos Clave'. Por favor, utiliza un formato claro y profesional en español." },
                            { inlineData: { mimeType: rec.blob.type, data: base64Data } }
                        ]
                    }]
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    rec.transcription = data.candidates[0].content.parts[0].text;
                } else {
                    throw new Error("Respuesta de IA vacía");
                }
            } catch (err) {
                console.error(err);
                alert("Error IA: " + (err.message || "No se pudo conectar con el servidor de IA"));
            } finally {
                rec.isAnalyzing = false;
                updateUI();
            }
        }

        function setupAudioListeners() {
            state.recordings.forEach(rec => {
                const audio = document.getElementById(`audio-${rec.id}`);
                if (!audio) return;
                audio.ontimeupdate = () => {
                    const prog = document.getElementById(`progress-${rec.id}`);
                    const time = document.getElementById(`time-${rec.id}`);
                    if (prog) prog.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
                    if (time) time.innerText = formatTime(audio.currentTime);
                };
                audio.onloadedmetadata = () => {
                    const dur = document.getElementById(`dur-${rec.id}`);
                    if (dur) dur.innerText = formatTime(audio.duration);
                };
                audio.onended = () => {
                    const icon = document.getElementById(`play-icon-${rec.id}`);
                    if (icon) {
                        icon.setAttribute('data-lucide', 'Play');
                        lucide.createIcons();
                    }
                };
            });
        }

        function toggleAudio(id) {
            const audio = document.getElementById(`audio-${id}`);
            const icon = document.getElementById(`play-icon-${id}`);
            if (audio.paused) {
                document.querySelectorAll('audio').forEach(a => {
                    if (a.id !== `audio-${id}`) {
                        a.pause();
                        const otherId = a.id.split('-')[1];
                        const otherIcon = document.getElementById(`play-icon-${otherId}`);
                        if (otherIcon) otherIcon.setAttribute('data-lucide', 'Play');
                    }
                });
                audio.play();
                icon.setAttribute('data-lucide', 'Pause');
            } else {
                audio.pause();
                icon.setAttribute('data-lucide', 'Play');
            }
            lucide.createIcons();
        }

        function stopAudio(id) {
            const audio = document.getElementById(`audio-${id}`);
            audio.pause();
            audio.currentTime = 0;
            const icon = document.getElementById(`play-icon-${id}`);
            icon.setAttribute('data-lucide', 'Play');
            lucide.createIcons();
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function shareEmail(id) {
            const rec = state.recordings.find(r => r.id === id);
            window.location.href = `mailto:?subject=Transcripción&body=${encodeURIComponent(rec.transcription)}`;
        }

        function shareWA(id) {
            const rec = state.recordings.find(r => r.id === id);
            window.open(`https://wa.me/?text=${encodeURIComponent(rec.transcription)}`, '_blank');
        }

        function setFormat(fmt) {
            if(!state.isRecording) { state.outputFormat = fmt; updateUI(); }
        }

        function setMode(isSpeaker) {
            if(!state.isRecording) { state.isSpeakerMode = isSpeaker; updateUI(); }
        }

        // Init
        updateUI();
    </script>
</body>
</html>
